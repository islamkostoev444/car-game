<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Car Game - Объезжай препятствия</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div>Счёт: <span id="score">0</span></div>
            <div>Лучший: <span id="highScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="controls">
            <button id="leftBtn">← Влево</button>
            <button id="rightBtn">Вправо →</button>
        </div>
        
        <div class="game-info">
            <p>Используй стрелки ← → или кнопки</p>
            <button id="restartBtn">Начать заново</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
